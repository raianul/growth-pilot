<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Azure Meridian - Brand Voice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-fixed-variant": "#0039b5",
            "on-primary": "#ffffff",
            "inverse-surface": "#2d3133",
            "on-primary-fixed": "#001551",
            "primary-container": "#1d4ed8",
            "on-tertiary-fixed-variant": "#832700",
            "surface-dim": "#d8dadc",
            "surface-container-low": "#f2f4f6",
            "on-surface-variant": "#434655",
            "on-secondary-container": "#fefcff",
            "surface-tint": "#2151da",
            "on-primary-container": "#cad3ff",
            "tertiary": "#7f2500",
            "surface": "#f7f9fb",
            "on-tertiary-fixed": "#390c00",
            "secondary-container": "#2170e4",
            "error-container": "#ffdad6",
            "outline": "#747686",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#191c1e",
            "secondary-fixed-dim": "#adc6ff",
            "secondary-fixed": "#d8e2ff",
            "on-error": "#ffffff",
            "primary-fixed": "#dce1ff",
            "on-secondary": "#ffffff",
            "background": "#f7f9fb",
            "surface-container-highest": "#e0e3e5",
            "on-secondary-fixed": "#001a42",
            "inverse-primary": "#b7c4ff",
            "on-error-container": "#93000a",
            "surface-container": "#eceef0",
            "secondary": "#0058be",
            "inverse-on-surface": "#eff1f3",
            "tertiary-container": "#a73400",
            "outline-variant": "#c4c5d7",
            "on-tertiary": "#ffffff",
            "tertiary-fixed": "#ffdbcf",
            "surface-bright": "#f7f9fb",
            "primary": "#0037b0",
            "surface-variant": "#e0e3e5",
            "error": "#ba1a1a",
            "on-tertiary-container": "#ffc9b7",
            "tertiary-fixed-dim": "#ffb59c",
            "on-secondary-fixed-variant": "#004395",
            "primary-fixed-dim": "#b7c4ff",
            "on-background": "#191c1e",
            "surface-container-high": "#e6e8ea"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .signature-gradient {
      background: linear-gradient(135deg, #0037b0 0%, #1d4ed8 100%);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- Top Navigation Bar - Suppression check: This is a setup/transactional screen, but keeping a minimal header for brand identity per JSON branding -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm shadow-blue-900/5 transition-colors">
<div class="flex justify-between items-center px-8 h-16 w-full max-w-7xl mx-auto">
<div class="text-xl font-bold tracking-tighter text-blue-800 dark:text-blue-300 font-headline">
        Azure Meridian
      </div>
<div class="hidden md:flex items-center gap-8 font-manrope text-sm font-medium tracking-tight">
<span class="text-slate-400">Step 2 of 3</span>
<div class="w-32 h-1 bg-surface-container rounded-full overflow-hidden">
<div class="w-2/3 h-full signature-gradient"></div>
</div>
</div>
</div>
</header>
<main class="flex-grow pt-24 pb-12 px-6 flex flex-col items-center justify-center max-w-6xl mx-auto w-full">
<!-- Editorial Headline Section -->
<div class="text-center mb-12 max-w-2xl">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold text-on-surface tracking-tight mb-4">
        Set your Brand Voice
      </h1>
<p class="text-lg text-on-surface-variant font-body">
        Select the personality that best reflects your company's identity and communication style.
      </p>
</div>
<!-- Bento-inspired Grid for Voice Selection -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
<!-- Card: Professional (Active State Example) -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-sm border-2 border-primary ring-4 ring-primary/5 transition-all text-left">
<div class="mb-6 p-3 rounded-lg bg-primary-container text-on-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="work" data-weight="fill" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Professional</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">
          Authoritative, precise, and reliable. Ideal for corporate environments and high-end services.
        </p>
<div class="absolute top-4 right-4 text-primary">
<span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card: Trendy -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary-container/30 transition-all text-left">
<div class="mb-6 p-3 rounded-lg bg-surface-container-low text-primary transition-colors group-hover:bg-primary-container group-hover:text-on-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Trendy</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">
          Modern, energetic, and culturally relevant. Perfect for lifestyle brands and creative startups.
        </p>
</button>
<!-- Card: Local -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary-container/30 transition-all text-left">
<div class="mb-6 p-3 rounded-lg bg-surface-container-low text-primary transition-colors group-hover:bg-primary-container group-hover:text-on-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="location_on">location_on</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Local</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">
          Friendly, grounded, and community-focused. Great for regional businesses and neighborhood icons.
        </p>
</button>
<!-- Card: Expert -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary-container/30 transition-all text-left">
<div class="mb-6 p-3 rounded-lg bg-surface-container-low text-primary transition-colors group-hover:bg-primary-container group-hover:text-on-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="school">school</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Expert</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">
          Knowledgeable, analytical, and insightful. Best for consultancies and educational platforms.
        </p>
</button>
</div>
<!-- Background Decoration (Precision Architect Style) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<!-- Navigation Actions -->
<div class="flex flex-col sm:flex-row items-center justify-between w-full mt-16 pt-8 gap-4">
<button class="flex items-center gap-2 px-8 py-3 font-label text-sm font-semibold text-primary bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-lg group">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
        Back
      </button>
<button class="signature-gradient flex items-center gap-2 px-12 py-4 font-label text-sm font-bold text-on-primary rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all group">
        Next Step
        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer Shell from JSON (Adapted for transaction) -->
<footer class="w-full py-8 flex justify-center gap-6 mt-auto">
<div class="font-inter text-xs text-slate-400 flex items-center gap-6">
<span>© 2024 Azure Meridian Precision Architect</span>
<div class="flex gap-4">
<a class="hover:text-blue-500 transition-colors" href="#">Terms</a>
<a class="hover:text-blue-500 transition-colors" href="#">Privacy</a>
<a class="hover:text-blue-500 transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
